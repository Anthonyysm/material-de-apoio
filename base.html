<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Twitter Clone{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .post-card {
            border: 1px solid #e1e8ed;
            border-radius: 12px;
            background: #fff;
        }

        .post-card:hover {
            background: #f7f9f9;
        }

        .post-author {
            font-weight: 700;
        }

        .post-time {
            color: #657786;
            font-size: 0.85rem;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #1da1f2;
            color: white;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-light bg-white border-bottom sticky-top">
        <div class="container" style="max-width:600px;">
            <a class="navbar-brand fw-bold text-primary" href="{% url 'landing' %}">
                <i class="bi bi-twitter"></i> Twitter Clone
            </a>
            <div class="d-flex align-items-center gap-2">
                {% if user.is_authenticated %}
                <span class="text-muted small">Olá, <strong>{{ user.username }}</strong></span>
                <a href="{% url 'post-create' %}" class="btn btn-primary btn-sm rounded-pill">+ Novo post</a>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-secondary btn-sm rounded-pill">Sair</button>
                </form>
                {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-primary btn-sm rounded-pill">Entrar</a>
                <a href="{% url 'signup' %}" class="btn btn-primary btn-sm rounded-pill">Criar conta</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container py-4" style="max-width:600px;">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
