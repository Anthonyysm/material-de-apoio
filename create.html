{% extends "base.html" %}
{% block title %}Novo Post{% endblock %}

{% block content %}
<div class="post-card p-4">
    <h5 class="fw-bold mb-3">Novo post</h5>
    <form method="post">
        {% csrf_token %}
        {{ form.content }}
        <div class="d-flex justify-content-between align-items-center mt-3">
            <a href="{% url 'feed' %}" class="btn btn-outline-secondary rounded-pill">Cancelar</a>
            <button type="submit" class="btn btn-primary rounded-pill px-4">Publicar</button>
        </div>
    </form>
</div>
{% endblock %}
