{% extends "base.html" %}
{% block title %}Entrar{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="card border-0 shadow-sm mx-auto" style="max-width:360px;">
        <div class="card-body p-4">
            <h4 class="text-center mb-4 fw-bold">
                <i class="bi bi-twitter text-primary"></i> Entrar
            </h4>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">{{ field.label }}</label>
                    <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}"
                        class="form-control rounded-pill px-3" {% if field.value %}value="{{ field.value }}" {% endif
                        %}>
                    {% if field.errors %}
                    <div class="text-danger small mt-1">{{ field.errors|join:", " }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary w-100 rounded-pill mt-2">Entrar</button>
            </form>
            <div class="text-center mt-3">
                <a href="{% url 'signup' %}" class="small text-decoration-none">Não tem conta? Crie aqui</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
